<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTX 2060 Nebula Engine - 3D Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .input_video { display: none; }
        #stats {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            background: rgba(0,0,0,0.7); padding: 15px; pointer-events: none;
            border: 1px solid #0ff; font-size: 12px; line-height: 1.6;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        #hud-msg { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="stats">
        DEVICE: RTX 2060 OPTIMIZED<br>
        PARTICLES: 50,000<br>
        FPS: <span id="fps">0</span><br>
        LATENCY: <span id="lat">0</span>ms<br>
        STATUS: <span id="hud-msg">INITIALIZING AI...</span>
    </div>
    <video class="input_video"></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const fpsOut = document.getElementById('fps');
        const latOut = document.getElementById('lat');
        const hudMsg = document.getElementById('hud-msg');
        
        let scene, camera, renderer, particles, targetPositions, velocities;
        const count = 50000; 
        let lastTime = 0;
        let handX = 0, handY = 0, handZ = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                powerPreference: "high-performance",
                precision: "highp" 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            velocities = new Float32Array(count * 3);

            // Initial random distribution
            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 50;
                targetPositions[i] = pos[i];
                velocities[i] = 0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({ 
                color: 0x00ffff, 
                size: 0.05, 
                blending: THREE.AdditiveBlending, 
                transparent: true, 
                depthWrite: false 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            
            setupAI();
            animate(0);
        }

        function setupAI() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            
            // Using modelComplexity 1 for RTX 2060
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.8,
                minTrackingConfidence: 0.8 
            });
            
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    hudMsg.innerText = "TRACKING ACTIVE";
                    const h = res.multiHandLandmarks[0][9]; // Palm Center
                    
                    // X and Y mapping
                    handX = (0.5 - h.x) * 45;
                    handY = (0.5 - h.y) * 35;
                    
                    // Z-Depth Calculation (Distance between Thumb and Pinky tips)
                    const thumb = res.multiHandLandmarks[0][4];
                    const pinky = res.multiHandLandmarks[0][20];
                    const handSize = Math.hypot(thumb.x - pinky.x, thumb.y - pinky.y);
                    const zDepth = handSize * 60; // Expand nebula based on palm openness

                    const time = performance.now() * 0.0008;

                    for (let i = 0; i < count * 3; i += 3) {
                        // 3D Spiral Nebula Math
                        const angle = i * 0.15;
                        const radius = 6 + Math.sin(angle + time) * 2.5;
                        
                        targetPositions[i] = handX + Math.cos(angle) * radius;
                        targetPositions[i+1] = handY + Math.sin(angle) * radius;
                        // Use handSize to drive the Z-axis expansion
                        targetPositions[i+2] = Math.sin(angle * 0.4 + time) * zDepth;
                    }
                } else {
                    hudMsg.innerText = "SEARCHING FOR HAND...";
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { 
                    const start = performance.now();
                    await hands.send({image: videoElement}); 
                    latOut.innerText = Math.round(performance.now() - start);
                },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS Counter
            const delta = time - lastTime;
            if (delta > 0) fpsOut.innerText = Math.round(1000 / delta);
            lastTime = time;

            const p = particles.geometry.attributes.position;
            
            // PHYSICS CONSTANTS
            const friction = 0.90; // High friction for "Nebula" feel
            const acceleration = 0.07; // Slow acceleration (0.75x speed feel)

            for (let i = 0; i < count * 3; i++) {
                const diff = targetPositions[i] - p.array[i];
                // Apply Velocity and Inertia
                velocities[i] = (velocities[i] + diff * acceleration) * friction;
                p.array[i] += velocities[i];
            }
            
            p.needsUpdate = true;
            
            // Slow rotation for extra 3D depth effect
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            
            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
