<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stark Element Discovery - RTX 2060 Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .input_video { display: none; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ffff;
            background: rgba(0, 20, 30, 0.6); padding: 15px; border: 1px solid #00ffff;
            pointer-events: none; font-size: 12px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        #btn { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        button { background: transparent; border: 2px solid #00ffff; color: #00ffff; padding: 20px 40px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="btn"><button onclick="startApp()">INITIALIZE ARC REACTOR CORE</button></div>
    <div id="hud">
        PROJECT: NEW ELEMENT<br>
        STATUS: <span id="status">STANDBY</span><br>
        POWER: <span id="power">100%</span>
    </div>
    <video class="input_video" playsinline muted></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

    <script>
        let scene, camera, renderer, composer, nucleusGroup, targetScale = 1;
        let atoms = [], lines = [];
        const atomCount = 14;
        let lastX = 0, lastY = 0;

        // --- FRESNEL SHADER DEFINITION ---
        const fresnelShader = {
            uniforms: { "glowColor": { value: new THREE.Color(0x00ffff) } },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPositionNormal;
                void main() {
                    vNormal = normalize( normalMatrix * normal );
                    vPositionNormal = normalize( ( modelViewMatrix * vec4(position, 1.0) ).xyz );
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                varying vec3 vNormal;
                varying vec3 vPositionNormal;
                void main() {
                    float intensity = pow( 0.7 - dot( vNormal, vPositionNormal ), 4.0 );
                    gl_FragColor = vec4( glowColor, intensity );
                }
            `
        };

        function startApp() {
            document.getElementById('btn').remove();
            initThree();
            setupAI();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- BLOOM SETUP ---
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.1;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.5;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // --- NUCLEUS BUILDING ---
            nucleusGroup = new THREE.Group();
            const atomMat = new THREE.ShaderMaterial({
                uniforms: THREE.UniformsUtils.clone(fresnelShader.uniforms),
                vertexShader: fresnelShader.vertexShader,
                fragmentShader: fresnelShader.fragmentShader,
                transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
            });

            const atomGeo = new THREE.IcosahedronGeometry(0.5, 1);
            for(let i = 0; i < atomCount; i++) {
                const atom = new THREE.Mesh(atomGeo, atomMat);
                atom.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                atoms.push(atom);
                nucleusGroup.add(atom);
            }

            scene.add(nucleusGroup);
            animate();
        }

        function setupAI() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
            
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0];
                    document.getElementById('status').innerText = "STABLE NUCLEUS";
                    
                    // Position Mapping
                    const palm = h[9];
                    const x = (0.5 - palm.x) * 20;
                    const y = (0.5 - palm.y) * 15;
                    nucleusGroup.position.set(x, y, 0);

                    // Pinch (Zoom/Scale)
                    const pinch = Math.hypot(h[8].x - h[4].x, h[8].y - h[4].y);
                    targetScale = 0.5 + (pinch * 8);

                    // Velocity Glitch
                    if (Math.abs(x - lastX) > 3) {
                        atoms.forEach(a => a.material.uniforms.glowColor.value.set(0xff0000));
                        setTimeout(() => atoms.forEach(a => a.material.uniforms.glowColor.value.set(0x00ffff)), 100);
                    }
                    lastX = x;
                }
            });

            const cam = new Camera(document.querySelector('.input_video'), {
                onFrame: async () => { await hands.send({image: document.querySelector('.input_video')}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Smooth Scaling
            nucleusGroup.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
            
            // Atomic Vibration Logic
            atoms.forEach((atom, i) => {
                const time = Date.now() * 0.001;
                atom.position.y += Math.sin(time + i) * 0.01;
                atom.rotation.y += 0.01;
            });

            nucleusGroup.rotation.y += 0.005;
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
