<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTX 2060 Galaxy Destroyer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .input_video { display: none; }
        #stats {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            background: rgba(0,0,0,0.7); padding: 15px; pointer-events: none;
            border: 1px solid #0ff; font-size: 11px; z-index: 100; text-shadow: 0 0 5px #0ff;
        }
    </style>
</head>
<body>
    <div id="stats">
        ENGINE: GALAXY DESTROYER (RTX 2060)<br>
        PARTICLES: 50,000<br>
        ZOOM: <span id="zoomLvl">1.0x</span><br>
        STATUS: <span id="modeText">STABLE</span>
    </div>
    <video class="input_video" playsinline muted></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const zoomOut = document.getElementById('zoomLvl');
        const modeText = document.getElementById('modeText');
        
        let scene, camera, renderer, particles, targetPositions, velocities;
        const count = 50000; 
        let lastTime = 0, lastPalmX = 0, lastPalmY = 0;
        let isDestroyed = false;

        const colorGalaxy = new THREE.Color(0x00ffff);
        const colorNova = new THREE.Color(0xff4400);

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(0,255,255,0.4)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                preserveDrawingBuffer: true,
                powerPreference: "high-performance" 
            });
            renderer.autoClearColor = false; 
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            velocities = new Float32Array(count * 3);

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({ 
                color: 0x00ffff, 
                size: 0.15, 
                map: createGlowTexture(),
                blending: THREE.AdditiveBlending, 
                transparent: true, 
                depthWrite: false 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            
            setupAI();
            animate(0);
        }

        // --- GALAXY DESTRUCTION LOGIC ---
        function destroyGalaxy() {
            if (isDestroyed) return;
            isDestroyed = true;
            modeText.innerText = "SUPERNOVA DETECTED";
            particles.material.color.copy(colorNova);
            
            // Random explosive vectors
            for (let i = 0; i < count * 3; i++) {
                targetPositions[i] *= (5 + Math.random() * 5); 
            }

            setTimeout(() => {
                isDestroyed = false;
                modeText.innerText = "STABLE";
            }, 1500);
        }

        function setupAI() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
            
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0][9];
                    const x = (0.5 - h.x) * 45;
                    const y = (0.5 - h.y) * 35;
                    
                    // DESTRUCTION TRIGGER (Fast flick)
                    if (Math.abs(x - lastPalmX) > 6.0 || Math.abs(y - lastPalmY) > 6.0) destroyGalaxy();
                    lastPalmX = x; lastPalmY = y;

                    // ZOOM LOGIC (Based on distance between thumb and pinky)
                    const thumb = res.multiHandLandmarks[0][4];
                    const pinky = res.multiHandLandmarks[0][20];
                    const zoomFactor = Math.hypot(thumb.x - pinky.x, thumb.y - pinky.y) * 10;
                    zoomOut.innerText = zoomFactor.toFixed(1) + "x";

                    if (!isDestroyed) {
                        for (let i = 0; i < count * 3; i += 3) {
                            const t = performance.now() * 0.0005;
                            const angle = i * 0.02 + t;
                            // Spiral Galaxy math
                            const spiral = i * 0.001;
                            const r = (spiral * 5) * zoomFactor;
                            
                            targetPositions[i] = x + Math.cos(angle) * r;
                            targetPositions[i+1] = y + Math.sin(angle) * r;
                            targetPositions[i+2] = Math.sin(spiral + t) * (10 * zoomFactor);
                        }
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate(time) {
            requestAnimationFrame(animate);
            lastTime = time;

            const p = particles.geometry.attributes.position;
            const speed = 0.075; // 0.75x Flow

            for (let i = 0; i < count * 3; i++) {
                const diff = targetPositions[i] - p.array[i];
                velocities[i] = (velocities[i] + diff * speed) * 0.92;
                p.array[i] += velocities[i];
            }
            p.needsUpdate = true;
            
            if (!isDestroyed) particles.material.color.lerp(colorGalaxy, 0.05);
            
            // TRAIL EFFECT for cinematic motion
            renderer.setClearColor(0x000000, 0.15);
            renderer.clear(true, false, false); 
            
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
