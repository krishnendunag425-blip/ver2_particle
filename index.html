<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTX 2060 Particle Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .input_video { display: none; }
        #stats {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none;
            border: 1px solid #0ff; font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="stats">
        DEVICE: RTX 2060 OPTIMIZED<br>
        PARTICLES: 50,000<br>
        FPS: <span id="fps">0</span><br>
        LATENCY: <span id="lat">0</span>ms
    </div>
    <video class="input_video"></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const fpsOut = document.getElementById('fps');
        const latOut = document.getElementById('lat');
        
        let scene, camera, renderer, particles, targetPositions, velocities;
        const count = 50000; 
        let lastTime = 0;
        let handX = 0, handY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            velocities = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 40;
                targetPositions[i] = pos[i];
                velocities[i] = 0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ 
                color: 0x00ffff, size: 0.04, blending: THREE.AdditiveBlending, 
                transparent: true, depthWrite: false 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            
            setupAI();
            animate(0);
        }

        function setupAI() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
            
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0][9];
                    handX = (0.5 - h.x) * 40;
                    handY = (0.5 - h.y) * 30;
                    
                    // Update target field based on hand position
                    for (let i = 0; i < count * 3; i += 3) {
                        targetPositions[i] = handX + Math.sin(i) * 5;
                        targetPositions[i+1] = handY + Math.cos(i) * 5;
                        targetPositions[i+2] = Math.sin(i * 0.1) * 2;
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { 
                    const start = performance.now();
                    await hands.send({image: videoElement}); 
                    latOut.innerText = Math.round(performance.now() - start);
                },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS Counter
            const delta = time - lastTime;
            fpsOut.innerText = Math.round(1000 / delta);
            lastTime = time;

            const p = particles.geometry.attributes.position;
            const friction = 0.92;
            const acceleration = 0.08;

            for (let i = 0; i < count * 3; i++) {
                const diff = targetPositions[i] - p.array[i];
                velocities[i] = (velocities[i] + diff * acceleration) * friction;
                p.array[i] += velocities[i];
            }
            
            p.needsUpdate = true;
            particles.rotation.z += 0.001;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
