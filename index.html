<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTX 2060 Hyper-Cinematic Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        .input_video { display: none; }
        #stats {
            position: absolute; top: 10px; left: 10px; color: #0ff;
            background: rgba(0,0,0,0.7); padding: 15px; pointer-events: none;
            border: 1px solid #0ff; font-size: 11px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="stats">
        ENGINE: HYPER-CINEMATIC (RTX 2060)<br>
        PARTICLES: 50,000<br>
        FPS: <span id="fps">0</span><br>
        MODE: <span id="modeText">STABLE</span>
    </div>
    <video class="input_video" playsinline muted></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.querySelector('.input_video');
        const fpsOut = document.getElementById('fps');
        const modeText = document.getElementById('modeText');
        
        let scene, camera, renderer, particles, targetPositions, velocities;
        const count = 50000; 
        let lastTime = 0, lastPalmX = 0, lastPalmY = 0;
        let isExploding = false;

        const colorCyan = new THREE.Color(0x00ffff);
        const colorRed = new THREE.Color(0xff2200);

        // --- 1. PROCEDURAL GLOW TEXTURE (From Code #1) ---
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(0,255,255,0.5)');
            gradient.addColorStop(0.5, 'rgba(0,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(0,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 22;

            renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                preserveDrawingBuffer: true, // FOR THE NEON TRAILS
                powerPreference: "high-performance" 
            });
            renderer.autoClearColor = false; // ENABLE TRAILS
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            targetPositions = new Float32Array(count * 3);
            velocities = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 40;
                targetPositions[i] = pos[i];
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            // --- CINEMATIC MATERIAL ---
            const mat = new THREE.PointsMaterial({ 
                color: 0x00ffff, 
                size: 0.12, 
                map: createGlowTexture(),
                blending: THREE.AdditiveBlending, 
                transparent: true, 
                depthWrite: false 
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
            
            setupAI();
            animate(0);
        }

        function triggerFirework() {
            if (isExploding) return;
            isExploding = true;
            modeText.innerText = "KINETIC BLAST";
            particles.material.color.copy(colorRed);
            
            for (let i = 0; i < count * 3; i++) {
                targetPositions[i] *= 6.0; // Explosion force
            }

            setTimeout(() => {
                isExploding = false;
                modeText.innerText = "STABLE";
            }, 800);
        }

        function setupAI() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
            
            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const h = res.multiHandLandmarks[0][9];
                    const x = (0.5 - h.x) * 45;
                    const y = (0.5 - h.y) * 35;
                    
                    // BLAST DETECTION
                    if (Math.abs(x - lastPalmX) > 4.5 || Math.abs(y - lastPalmY) > 4.5) triggerFirework();
                    lastPalmX = x; lastPalmY = y;

                    const thumb = res.multiHandLandmarks[0][4];
                    const pinky = res.multiHandLandmarks[0][20];
                    const zDepth = Math.hypot(thumb.x - pinky.x, thumb.y - pinky.y) * 60;

                    for (let i = 0; i < count * 3; i += 3) {
                        const angle = i * 0.15;
                        const radius = 6 + Math.sin(angle + performance.now() * 0.001) * 2;
                        targetPositions[i] = x + Math.cos(angle) * radius;
                        targetPositions[i+1] = y + Math.sin(angle) * radius;
                        targetPositions[i+2] = Math.sin(angle * 0.5) * zDepth;
                    }
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            fpsOut.innerText = Math.round(1000 / (time - lastTime));
            lastTime = time;

            const p = particles.geometry.attributes.position;
            const speed = 0.075; // YOUR 0.75X SPEED

            for (let i = 0; i < count * 3; i++) {
                const diff = targetPositions[i] - p.array[i];
                velocities[i] = (velocities[i] + diff * speed) * 0.92;
                p.array[i] += velocities[i];
            }
            p.needsUpdate = true;
            
            if (!isExploding) particles.material.color.lerp(colorCyan, 0.05);
            
            // --- TRAIL EFFECT ---
            renderer.setClearColor(0x000000, 0.12); // Controls trail length
            renderer.clear(true, false, false); 
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
